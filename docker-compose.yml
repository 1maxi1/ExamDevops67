services:
  db:
    image: postgres:16-alpine
    container_name: examdevops6-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pottery_workshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pottery_workshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: examdevops6-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/pottery_workshop
    ports:
      - "8000:8000"

volumes:
  postgres_data:
